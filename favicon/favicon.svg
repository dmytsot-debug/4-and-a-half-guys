<?xml version="1.0" encoding="UTF-8"?>
<!--
  Simple checkered "4½" favicon. Vector — scales perfectly.
  Modern browsers (Chrome, Firefox, Safari, Edge) all support SVG favicons.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: red rounded square -->
  <rect width="64" height="64" rx="10" fill="#D62828"/>

  <!-- Tiny checker pattern in the corners -->
  <g fill="#FAF7F2">
    <rect x="0"  y="0"  width="8" height="8"/>
    <rect x="16" y="0"  width="8" height="8"/>
    <rect x="8"  y="8"  width="8" height="8"/>
    <rect x="40" y="56" width="8" height="8"/>
    <rect x="56" y="56" width="8" height="8"/>
    <rect x="48" y="48" width="8" height="8"/>
  </g>

  <!-- "4½" wordmark -->
  <text
    x="50%"
    y="55%"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#FAF7F2"
    font-family="Impact, 'Arial Narrow', sans-serif"
    font-size="32"
    font-weight="900"
  >4½</text>
</svg>
